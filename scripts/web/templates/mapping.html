async function loadSentryTimeline() {
    const list = document.getElementById('vpList');
    list.innerHTML = '<div class="vp-loading">Loading\u2026</div>';

    try {
        const resp = await fetch('/api/sentry-events');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();

        if (!data.events || data.events.length === 0) {
            list.innerHTML = '<div class="vp-empty">No events detected yet</div>';
            return;
        }

        const events = data.events;
        // Build date range for summary
        const first = events[events.length - 1];
        const last = events[0];
        const fmtShort = function(iso) {
            if (!iso) return '';
            try {
                var d = new Date(iso.replace(' ', 'T'));
                return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
            } catch(e) { return ''; }
        };
        const rangeStr = events.length > 1
            ? fmtShort(first.timestamp) + ' \u2013 ' + fmtShort(last.timestamp)
            : fmtShort(last.timestamp);

        let html = '<div class="sentry-timeline">';
        html += '<div class="st-summary"><strong>' + events.length + ' Event' + (events.length !== 1 ? 's' : '') + '</strong> \u00b7 <span>' + rangeStr + '</span></div>';

        events.forEach(function(ev) {
            const evType = ev.event_type || '';
            // Map event types to display labels and dot classes
            const eventLabels = {
                'sentry': { label: '🟣 Sentry Mode', dot: 'sentry' },
                'saved': { label: '🔵 Saved Clip', dot: 'saved' },
                'harsh_brake': { label: '🔴 Hard Brake', dot: 'driving' },
                'emergency_brake': { label: '🔴 Emergency Brake', dot: 'driving-critical' },
                'hard_acceleration': { label: '🟠 Hard Acceleration', dot: 'driving' },
                'sharp_turn': { label: '🟡 Sharp Turn', dot: 'driving' },
                'speed_alert': { label: '🔴 Speed Alert', dot: 'driving-critical' },
                'fsd_disengage': { label: '🟢 FSD Disengage', dot: 'fsd' },
                'fsd_engage': { label: '🟢 FSD Engage', dot: 'fsd' },
            };
            const info = eventLabels[evType] || { label: evType.replace(/_/g, ' '), dot: 'driving' };
            const dotClass = info.dot;
            const typeLabel = info.label;
            const dateStr = formatLocalTime(ev.timestamp);
            const folder = (ev.event_folder || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const sourceFolder = (ev.source_folder || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

            // Driving events have description; sentry/saved have clip counts
            const isFolderEvent = (evType === 'sentry' || evType === 'saved');
            // Sentry/saved metadata is now lazy-loaded via /api/event-details
            // when the card scrolls into view; show a placeholder until it
            // arrives. This keeps the initial /api/sentry-events response
            // pure-DB and the panel responsive even with hundreds of events.
            let metaHtml = '';
            let metaIsLazy = false;
            if (isFolderEvent) {
                if (folder) {
                    metaHtml = '<span class="st-meta-loading">Loading details\u2026</span>';
                    metaIsLazy = true;
                } else {
                    // No event folder (rare — orphaned event row); nothing to fetch.
                    metaHtml = '';
                }
            } else {
                // Driving event — show description and severity
                const desc = ev.description || '';
                const sev = ev.severity || '';
                metaHtml = desc || sev;
            }

            const hasCoords = ev.lat != null && ev.lon != null && (ev.lat !== 0 || ev.lon !== 0);
            const videoPath = (ev.video_path || '').replace(/"/g, '&quot;');
            const frameOffset = ev.frame_offset || 0;

            html += '<div class="st-event" data-folder="' + sourceFolder + '" data-name="' + folder + '" data-video-path="' + videoPath + '" data-frame-offset="' + frameOffset + '" data-event-type="' + evType + '"';
            if (hasCoords) html += ' data-lat="' + ev.lat + '" data-lon="' + ev.lon + '"';
            html += '>';
            html += '<div class="st-dot ' + dotClass + '"></div>';
            html += '<div class="st-card">';
            html += '<div class="st-type">' + typeLabel + '</div>';
            html += '<div class="st-date">' + dateStr + '</div>';
            html += '<div class="st-meta"' + (metaIsLazy ? ' data-lazy-meta="1"' : '') + '>' + metaHtml + '</div>';
            html += '<div class="st-actions">';
            if (isFolderEvent) {
                // Sentry/saved events — always have a play button
                html += '<button class="vp-btn st-btn-play" title="Play">&#9654;</button>';
                html += '<button class="vp-btn st-btn-dl" title="Download ZIP">&#11015;</button>';
            } else if (hasCoords) {
                // Driving events with coordinates — show on map instead of play
                html += '<button class="vp-btn st-btn-map" title="Show on Map" data-lat="' + ev.lat + '" data-lon="' + ev.lon + '">&#128205;</button>';
            } else if (videoPath) {
                // Driving events without coordinates — play button as fallback
                html += '<button class="vp-btn st-btn-play" title="Play">&#9654;</button>';
            }
            if (isFolderEvent) {
                html += '<button class="vp-btn vp-btn-danger st-btn-del" title="Delete">&#128465;</button>';
            }
            html += '</div></div></div>';
        });

        html += '</div>';
        list.innerHTML = html;
        startLazyEventDetails(list);
    } catch(e) {
        console.error('Failed to load sentry timeline:', e);
        list.innerHTML = '<div class="vp-empty">Failed to load events</div>';
    }
}

// Lazy-fetch per-event details (clip count, camera count, size) only for
// cards that scroll into view. Earlier code did this enrichment server-side
// in a single /api/sentry-events call, which fired N filesystem ops up
// front and made the panel sluggish on a Pi Zero 2 W. The endpoint is
// now DB-only; this observer fills in the metadata on demand.
function startLazyEventDetails(container) {
    const cards = container.querySelectorAll('.st-event');
    if (!cards.length) return;

    const inflight = new Set();
    const fetchDetails = function(card) {
        const folder = card.getAttribute('data-folder');
        const name = card.getAttribute('data-name');
        if (!folder || !name) return;
        const key = folder + '/' + name;
        if (inflight.has(key)) return;
        inflight.add(key);

        const metaEl = card.querySelector('.st-meta[data-lazy-meta="1"]');
        if (!metaEl) return;

        fetch('/api/event-details/' + encodeURIComponent(folder) + '/' + encodeURIComponent(name))
            .then(function(r) { return r.ok ? r.json() : null; })
            .then(function(data) {
                if (!data || data.error) {
                    metaEl.textContent = '';
                    metaEl.removeAttribute('data-lazy-meta');
                    return;
                }
                const clips = data.clip_count != null ? data.clip_count : '?';
                const cams = data.camera_count != null ? data.camera_count : '?';
                const sizePart = data.size_mb ? Math.round(data.size_mb) + ' MB' : '';
                const parts = [clips + ' clips', cams + ' cameras'];
                if (sizePart) parts.push(sizePart);
                metaEl.textContent = parts.join(' \u00b7 ');
                metaEl.removeAttribute('data-lazy-meta');
            })
            .catch(function() {
                metaEl.textContent = '';
                metaEl.removeAttribute('data-lazy-meta');
            });
    };

    if (typeof IntersectionObserver === 'function') {
        const io = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    fetchDetails(e.target);
                    io.unobserve(e.target);
                }
            });
        }, { root: container, rootMargin: '200px 0px' });
        cards.forEach(function(c) {
            if (c.querySelector('.st-meta[data-lazy-meta="1"]')) io.observe(c);
        });
    } else {
        // No IntersectionObserver — fall back to a simple "fetch the first
        // 20" pass. Better than blocking the server response on every event.
        Array.prototype.slice.call(cards, 0, 20).forEach(fetchDetails);
    }
}

async function loadTripsTimeline() {
    const list = document.getElementById('vpList');
    list.innerHTML = '<div class="vp-empty">Trip routes are not available.<br><small>GPS data is required for trip mapping. Browse events and clips using the Events and All Clips tabs.</small></div>';

}

async function loadVideoList(append) {
    const folder = document.getElementById('vpFolder').value;
    const list = document.getElementById('vpList');
    if (!append) { list.innerHTML = '<div class="vp-loading">Loading\u2026</div>'; vpPage = 1; }

    try {
        const resp = await fetch('/videos/?folder=' + encodeURIComponent(folder) + '&page=' + vpPage, {
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const data = await resp.json();
        vpHasNext = data.has_next;
        vpFolderStructure = data.folder_structure || 'events';

        if (!append) list.innerHTML = '';
        if (!data.events || data.events.length === 0) {
            if (!append) list.innerHTML = '<div class="vp-empty">No videos in this folder</div>';
            return;
        }

        // Show summary count on first page load
        if (!append && data.total_count) {
            const totalVids = data.total_video_count || 0;
            const summary = document.createElement('div');
            summary.className = 'st-summary';
            summary.innerHTML = '<strong>' + data.total_count + ' Clip' + (data.total_count !== 1 ? 's' : '') + '</strong>' + (totalVids > 0 ? ' \u00b7 <span>' + totalVids + ' video' + (totalVids !== 1 ? 's' : '') + '</span>' : '');
            list.appendChild(summary);
        }

        data.events.forEach(function(ev) {
            const card = document.createElement('div');
            card.className = 'vp-clip';

            const name = ev.name || 'Unknown';
            const safeName = name.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const dateStr = name.replace(/_/g, ' ').substring(0, 16);
            const safeDateStr = dateStr.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
            const sizeMb = ev.size_mb || 0;
            const cameras = Object.keys(ev.camera_videos || {}).length;
            const reason = ev.reason || '';
            const safeReason = reason.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

            card.innerHTML =
                '<div class="vp-clip-info">' +
                    '<div class="vp-clip-date">' + safeDateStr + '</div>' +
                    '<div class="vp-clip-meta">' + cameras + ' cam\u00b7 ' + sizeMb.toFixed(0) + ' MB</div>' +
                    (reason ? '<div class="vp-clip-reason">' + safeReason + '</div>' : '') +
                '</div>' +
                '<div class="vp-actions">' +
                    (ev.city
                        ? '<button class="vp-btn vp-btn-map" title="Show on Map">&#128205;</button>'
                        : '<button class="vp-btn vp-btn-play" title="Play">&#9654;</button>') +
                    '<button class="vp-btn vp-btn-dl" title="Download ZIP">&#11015;</button>' +
                    {% if cloud_provider_connected %}'<button class="vp-btn vp-btn-archive" title="Archive to Cloud" style="color:#32ADE6">&#9729;</button>' +{% endif %}
                    '<button class="vp-btn vp-btn-danger vp-btn-del" title="Delete">&#128465;</button>' +
                '</div>';

            // Store data attributes for event delegation (safe from XSS)
            card.dataset.folder = folder;
            card.dataset.name = name;
            card.dataset.structure = vpFolderStructure;
            list.appendChild(card);
        });

        // Remove existing load-more button
        var existingMore = list.querySelector('.vp-load-more');
        if (existingMore) existingMore.remove();

        if (vpHasNext) {
            var more = document.createElement('button');
            more.className = 'vp-load-more';
            more.textContent = 'Load More';
            more.onclick = function() { vpPage++; more.remove(); loadVideoList(true); };
            list.appendChild(more);
        }
    } catch(e) {
        console.error('Failed to load videos:', e);
        if (!append) list.innerHTML = '<div class="vp-empty">Failed to load videos</div>';
    }
}

function vpPlay(folder, name, structure) {
    openVideoFromPanel(folder, name);
}

async function openVideoFromPanel(folder, eventName) {
    // Close the video panel to see the map
    if (videoPanelOpen) toggleVideoPanel();

    try {
        // Fetch actual clip paths from the server
        const resp = await fetch(`/api/event-clips/${encodeURIComponent(folder)}/${encodeURIComponent(eventName)}`);
        const data = await resp.json();
        if (data.error) throw new Error(data.error);

        const frontClips = data.front_clips || [];
        if (frontClips.length === 0) {
            if (typeof showToast === 'function') showToast('No video clips found', 'warning');
            return;
        }

        // Look up waypoints for this clip directly from the DB
        const firstPath = frontClips[0];
        let waypoints = [];
        try {
            const wpResp = await fetch(`/api/waypoints-for-clip?path=${encodeURIComponent(firstPath)}`);
            const wpData = await wpResp.json();
            waypoints = wpData.waypoints || [];
        } catch(e) {
            console.warn('Waypoint lookup failed:', e);
        }

        // Open overlay with the first front clip
        const wp = waypoints.length > 0
            ? (waypoints.find(w => w.video_path && firstPath.includes(getBasePath(w.video_path))) || waypoints[0])
            : { video_path: firstPath, frame_offset: 0 };
        // Ensure video_path points to the actual clip
        wp.video_path = firstPath;

        const clickPoint = { x: window.innerWidth / 3, y: window.innerHeight / 4 };
        openVideoOverlay(wp, clickPoint, waypoints);

        // Store folder/event for download/delete
        const overlay = document.getElementById('videoOverlay');
        if (overlay) {
            overlay.dataset.folder = folder;
            overlay.dataset.event = eventName;
        }
    } catch(e) {
        console.error('Failed to open video:', e);
        if (typeof showToast === 'function') showToast('Failed to open video: ' + e.message, 'error');
    }
}

function vpDownload(folder, name) {
    window.location.href = '/videos/download_event/' + encodeURIComponent(folder) + '/' + encodeURIComponent(name);
}

async function vpDelete(folder, name) {
    if (!confirm('Delete "' + name + '" and all its camera angles?')) return;
    try {
        var resp = await fetch('/videos/delete_event/' + encodeURIComponent(folder) + '/' + encodeURIComponent(name), { method: 'POST' });
        var data = await resp.json();
        if (data.success) {
            if (typeof showToast === 'function') showToast('Deleted ' + data.deleted_count + ' files', 'success');
            loadVideoList();
        } else {
            if (typeof showToast === 'function') showToast(data.error || 'Delete failed', 'error');
        }
    } catch(e) {
        if (typeof showToast === 'function') showToast('Delete failed: ' + e.message, 'error');
    }
}

async function vpArchive(folder, name, btn) {
    if (btn) { btn.disabled = true; btn.textContent = '⏳'; }
    try {
        var resp = await fetch('/cloud/api/archive_file', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
            body: JSON.stringify({ folder: folder, event: name })
        });
        var data = await resp.json();
        if (data.success) {
            if (typeof showToast === 'function') showToast(data.message, 'success');
            _vpArchivePoll(btn);
        } else {
            if (typeof showToast === 'function') showToast(data.message || 'Archive failed', 'error');
            if (btn) { btn.disabled = false; btn.textContent = '☁'; }
        }
    } catch(e) {
        if (typeof showToast === 'function') showToast('Archive failed: ' + e.message, 'error');
        if (btn) { btn.disabled = false; btn.textContent = '☁'; }
    }
}

function _vpArchivePoll(btn) {
    var timer = setInterval(async function() {
        try {
            var resp = await fetch('/cloud/api/archive_status', { headers: { 'X-Requested-With': 'XMLHttpRequest' } });
            var st = await resp.json();
            if (st.completed) {
                clearInterval(timer);
                if (btn) { btn.textContent = '✓'; btn.style.color = '#34C759'; }
                if (typeof showToast === 'function') showToast('Archived to cloud!', 'success');
                setTimeout(function() { if (btn) { btn.disabled = false; btn.textContent = '☁'; btn.style.color = '#32ADE6'; } }, 4000);
            } else if (st.error) {
                clearInterval(timer);
                if (typeof showToast === 'function') showToast(st.error, 'error');
                if (btn) { btn.disabled = false; btn.textContent = '☁'; btn.style.color = '#32ADE6'; }
            } else if (st.running && btn) {
                var pct = st.total_size > 0 ? Math.min(99, Math.round((st.bytes_transferred || 0) / st.total_size * 100)) : 0;
                btn.textContent = pct + '%';
            }
        } catch(e) { /* keep polling */ }
    }, 2000);
}

async function vpQueueForSync(folder, name, btn) {
    if (btn) { btn.disabled = true; }
    try {
        var resp = await fetch('/cloud/api/queue_event', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
            body: JSON.stringify({ folder: folder, event: name })
        });
        var data = await resp.json();
        if (data.success) {
            if (typeof showToast === 'function') showToast(data.message, 'success');
            if (btn) { btn.style.color = 'var(--accent-success, #30D158)'; btn.textContent = '✓Q'; }
        } else {
            if (typeof showToast === 'function') showToast(data.message || 'Queue failed', 'error');
        }
    } catch(e) {
        if (typeof showToast === 'function') showToast('Queue failed: ' + e.message, 'error');
    } finally {
        if (btn) { btn.disabled = false; }
    }
}

// Event delegation for video panel buttons (prevents XSS from inline onclick)
document.getElementById('vpList').addEventListener('click', function(e) {
    var btn = e.target.closest('.vp-btn');
    if (!btn) return;

    // Sentry timeline event buttons
    var stEvent = btn.closest('.st-event');
    if (stEvent) {
        var folder = stEvent.dataset.folder;
        var name = stEvent.dataset.name;
        var videoPath = stEvent.dataset.videoPath;
        var evType = stEvent.dataset.eventType;
        var isFolderEvent = (evType === 'sentry' || evType === 'saved');

        if (btn.classList.contains('st-btn-play')) {
            if (isFolderEvent && name) {
                openVideoFromPanel(folder, name);
            } else if (videoPath) {
                // Driving event — open overlay with the video directly
                var lat = parseFloat(stEvent.dataset.lat);
                var lon = parseFloat(stEvent.dataset.lon);
                var frameOffset = parseInt(stEvent.dataset.frameOffset) || 0;
                openVideoOverlay({ video_path: videoPath, frame_offset: frameOffset, lat: lat, lon: lon });
                if (!isNaN(lat) && !isNaN(lon)) map.setView([lat, lon], 16);
            }
        } else if (btn.classList.contains('st-btn-dl')) {
            window.location.href = '/videos/download_event/' + encodeURIComponent(folder) + '/' + encodeURIComponent(name);
        } else if (btn.classList.contains('st-btn-map')) {
            var lat = parseFloat(btn.dataset.lat);
            var lon = parseFloat(btn.dataset.lon);
            if (!isNaN(lat) && !isNaN(lon)) {
                map.setView([lat, lon], 16);
                toggleVideoPanel();
            }
        } else if (btn.classList.contains('st-btn-del')) {
            vpDelete(folder, name).then(function() {
                if (vpCurrentTab === 'sentry') loadSentryTimeline();
            });
        }
        return;
    }

    // Clips tab buttons
    var clip = btn.closest('.vp-clip');
    if (!clip) return;
    var folder = clip.dataset.folder;
    var name = clip.dataset.name;
    var structure = clip.dataset.structure;
    if (btn.classList.contains('vp-btn-play')) vpPlay(folder, name, structure);
    else if (btn.classList.contains('vp-btn-map')) vpPlay(folder, name, structure);
    else if (btn.classList.contains('vp-btn-dl')) vpDownload(folder, name);
    else if (btn.classList.contains('vp-btn-archive')) vpArchive(folder, name, btn);
    else if (btn.classList.contains('vp-btn-del')) vpDelete(folder, name);
});

// --- Init ---
loadStats();

// Restore selected day / view-mode from the URL before the first
// loadDays() call so the page lands on the correct view on refresh /
// shared link / bookmark. loadDays() consults ``currentDate`` and
// ``showingAllTime`` when deciding what to render and falls back to
// the most-recent day if the URL-supplied date isn't in allDays.
(function initFromUrl() {
    const urlState = readUrlState();
    if (urlState && urlState.view === 'all-time') {
        showingAllTime = true;
    } else if (urlState && urlState.date) {
        currentDate = urlState.date;
    }
    loadDays();
})();

// Browser back/forward — re-derive state from the URL and dispatch
// without writing back to history (skipHistory). Guards against
// firing before the initial loadDays() resolved by waiting for
// allDays to be populated.
window.addEventListener('popstate', function () {
    const state = readUrlState();
    if (state && state.view === 'all-time') {
        if (allDays.length) showAllTime({ skipHistory: true });
        return;
    }
    if (!allDays.length) return;
    const target = (state && state.date &&
                    allDays.some(d => d.date === state.date))
        ? state.date
        : allDays[0].date;
    loadDay(target, { skipHistory: true });
});

// Keyboard shortcuts: left/right arrows cycle days. Skip while the
// user is typing into a form control or has the video overlay open
// (it has its own clip-cycling behavior bound to the same keys).
document.addEventListener('keydown', function (e) {
    if (e.altKey || e.ctrlKey || e.metaKey || e.shiftKey) return;
    const tag = (e.target && e.target.tagName) || '';
    if (/^(INPUT|TEXTAREA|SELECT)$/.test(tag) || (e.target && e.target.isContentEditable)) {
        return;
    }
    // If the video overlay is open, let it own the arrow keys.
    const overlay = document.getElementById('videoOverlay');
    if (overlay && overlay.style.display !== 'none' && overlay.offsetParent !== null) {
        return;
    }
    if (e.key === 'ArrowLeft') {
        e.preventDefault();
        cycleDay(-1);
    } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        cycleDay(1);
    }
});

// Kick off the indexing-status poll loop. It self-schedules with
// a fast cadence while a file is being parsed and a slow cadence
// when idle, so the banner appears within ~3 s of any background
// indexing activity without hammering the API in steady state.
pollIndexer();
